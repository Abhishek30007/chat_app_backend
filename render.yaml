services:
  - type: web
    name: chat-app-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://chat-app-frontend-029z.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
